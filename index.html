<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="TC News — a tik-choco news app that auto-collects RSS feeds and generates and shares news articles with an LLM." />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0e12" media="(prefers-color-scheme: dark)" />
    <title>TC News</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Apply the saved theme before first paint to avoid a flash of the wrong
         theme (FOUC). Mirrors useTheme(): the choice is stored as a raw
         "light"/"dark" string under tc-news:theme; default is light. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('tc-news:theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
